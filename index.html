<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <!-- Fallback meta redirect -->
    <meta http-equiv="refresh" content="0; url=https://srikar.vercel.app/">
    <!-- Immediate JS redirect -->
    <script>
        window.location.replace("https://srikar.vercel.app/" + window.location.pathname + window.location.search + window.location.hash);
    </script>
</head>

<body>
    <p>If you are not redirected automatically, follow this <a href="https://srikar.vercel.app/">link to the new
            portfolio</a>.</p>
</body>

</html>
